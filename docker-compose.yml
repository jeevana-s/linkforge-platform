version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-linkforge}
      POSTGRES_USER: ${POSTGRES_USER:-linkforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-linkforge_secure_2026}
    
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    

  
  
  backend:
    build: ./backend
    depends_on: [postgres, redis]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-linkforge}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-linkforge}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-linkforge_secure_2026}
      SPRING_DATA_REDIS_HOST: redis
      
      JWT_SECRET: ${JWT_SECRET:-Qw7xN2pLm9KfR4tYv8Uz1Hs6Bd3Ee0AaWqPpLxM}
      APP_BASE_URL: http://localhost:8081
    ports: ["8081:8080"]

  frontend:
    build: ./frontend
    depends_on: [backend]
    environment:
      VITE_API_URL: http://localhost:8081
    ports: ["3000:80"]

volumes:
  pgdata:
